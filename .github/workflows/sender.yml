name: FireScale Single-Stream Bulk

on:
  workflow_dispatch:
    inputs:
      email_list:
        description: 'Comma separated emails (e1@mail.com, e2@mail.com)'
        required: true
      sender_name:
        required: true
      subject:
        required: true

jobs:
  bulk-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Setup Mail
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sendmail
          sudo sendmail -bd -q15m
      - name: Install Nodemailer
        run: npm install nodemailer
      - name: Run Single Workflow Bulk
        run: node send.js "${{ github.event.inputs.email_list }}" "${{ github.event.inputs.sender_name }}" "${{ github.event.inputs.subject }}"
