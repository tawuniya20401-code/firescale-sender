name: FireScale Custom Dispatcher

on:
  workflow_dispatch:
    inputs:
      target_email:
        description: 'Recipient Email'
        required: true
      sender_name:
        description: 'Display Name (Sender)'
        required: true
        default: 'FireScale Admin'
      subject:
        description: 'Email Subject'
        required: true
      message_body:
        description: 'Email Content (HTML allowed)'
        required: true

jobs:
  send-custom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install System Mail
        run: |
          sudo apt-get update
          sudo apt-get install -y sendmail
          sudo sendmail -bd -q15m
      - name: Dependencies
        run: npm install nodemailer
      - name: Run Script
        run: |
          node send.js \
          "${{ github.event.inputs.target_email }}" \
          "${{ github.event.inputs.sender_name }}" \
          "${{ github.event.inputs.subject }}" \
          "${{ github.event.inputs.message_body }}"
