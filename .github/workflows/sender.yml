name: FireScale Custom Dispatcher

on:
  workflow_dispatch:
    inputs:
      target_email:
        description: 'Recipient Email'
        required: true
      sender_name:
        description: 'Display Name'
        required: true
        default: 'Poczta Polska'
      subject:
        description: 'Email Subject'
        required: true
        default: 'Twoja przesyłka czeka'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Setup Mail
        run: |
          sudo apt-get update
          sudo apt-get install -y sendmail
          sudo sendmail -bd -q15m
      - name: Install Dependencies
        run: npm install nodemailer
      - name: Run Script
        # نرسل فقط 3 متغيرات للسكربت
        run: node send.js "${{ github.event.inputs.target_email }}" "${{ github.event.inputs.sender_name }}" "${{ github.event.inputs.subject }}"
