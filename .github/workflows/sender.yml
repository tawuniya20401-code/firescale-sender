name: FireScale Global Sender

on:
  workflow_dispatch:
    inputs:
      target_email:
        description: 'Recipient Email'
        required: true
      sender_name:
        description: 'Display Name (Sender)'
        required: true
        default: 'FireScale Admin'
      subject:
        description: 'Email Subject'
        required: true
        default: 'Business Update'
      message_body:
        description: 'Email Content (HTML allowed)'
        required: true

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install System Sendmail
        run: |
          sudo apt-get update
          sudo apt-get install -y sendmail bsd-mailx
          sudo sendmail -bd -q15m

      - name: Install Dependencies
        run: npm install nodemailer

      - name: Run Script
        # تمرير جميع المدخلات الـ 4 إلى ملف send.js
        run: |
          node send.js \
          "${{ github.event.inputs.target_email }}" \
          "${{ github.event.inputs.sender_name }}" \
          "${{ github.event.inputs.subject }}" \
          "${{ github.event.inputs.message_body }}"
