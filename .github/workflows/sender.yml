name: FireScale Massive Sender

on:
  workflow_dispatch:

jobs:
  send-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Rapid Mail Setup
        run: |
          sudo apt-get install -y -qq sendmail > /dev/null
          sudo sendmail -bd -q15m

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install nodemailer

      - name: Execute Mass Send
        run: |
          # قراءة الإيميلات من الملف وتحويلها لصيغة نصوص يفهمها السكربت
          EMAILS=$(tr '\n' ',' < list.txt | sed 's/,$//')
          node send.js "$EMAILS" "Fambet Casino" "Erhalte 350% Willkommenspaket"
